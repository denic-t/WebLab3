<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets" template="template.xhtml">

    <ui:define name="title">Web Lab 3 - Start</ui:define>

    <ui:define name="head">
        <!-- Clock script -->
        <script type="text/javascript">
            function updateClock() {
                const now = new Date();
                const options = {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                };
                document.getElementById('clock').innerText = now.toLocaleString('ru-RU', options);
            }
            setInterval(updateClock, 5000);
            window.onload = updateClock;
        </script>
    </ui:define>

    <ui:define name="content">
        <div class="container" style="text-align: center;">
            <h2>Стартовая страница</h2>
            <div id="clock" style="font-size: 2em; margin: 20px 0; font-weight: bold; color: #2c3e50;">
                <!-- Clock will be here -->
            </div>
            <h:link outcome="goToMain" styleClass="back-link" style="background-color: #3498db;">
                Перейти к основной странице
            </h:link>
        </div>
    </ui:define>

</ui:composition>
